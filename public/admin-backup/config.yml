backend:
  name: github
  repo: ewgsta/ewgsta
  branch: main
  base_url: https://www.ewgsta.me
  auth_endpoint: api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "blog"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Image", name: "thumbnail", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Featured Project", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "Project URL", name: "link", widget: "string", required: false}
      - {label: "Tech Stack", name: "tech", widget: "list", field: {label: "Technology", name: "tech_item", widget: "string"}}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Site Config"
    files:
      - name: "config"
        label: "Global Configuration"
        file: "src/content/site/config.yaml"
        fields:
          # SEO Settings
          - {label: "Site Title", name: "siteTitle", widget: "string", default: "Furkan (ewgsta)"}
          - {label: "Site Description (SEO)", name: "siteDescription", widget: "text", default: "Personal website and blog"}
          - {label: "Site URL", name: "siteUrl", widget: "string", default: "https://www.ewgsta.me"}
          - {label: "Site Language", name: "siteLanguage", widget: "string", default: "tr"}
          - {label: "Site Author", name: "siteAuthor", widget: "string", default: "Furkan"}
          - {label: "Site Keywords", name: "siteKeywords", widget: "string", default: "blog, portfolio, developer", required: false}
          - {label: "OG Image (Social Preview)", name: "ogImage", widget: "image", required: false}
          
          # Branding
          - {label: "Logo URL", name: "logoUrl", widget: "string", default: "https://github.com/ewgsta.png"}
          - {label: "Logo Text", name: "logoText", widget: "string", default: "Furkan"}
          - {label: "Footer Text", name: "footerText", widget: "string", default: "© 2026 Furkan. All rights reserved."}
          - {label: "Hero Title", name: "heroTitle", widget: "string", default: "Furkan :3"}
          - {label: "Quote Text", name: "quoteText", widget: "string", default: "What is meant to be will be..."}
          
          # Labels
          - {label: "Find Me On Label", name: "findMeOnLabel", widget: "string", default: "Find me on"}
          - {label: "Projects Label", name: "projectsLabel", widget: "string", default: "Projects"}
          - {label: "Posts Label", name: "postsLabel", widget: "string", default: "Posts"}
          - {label: "Read More Label", name: "readMoreLabel", widget: "string", default: "Read More"}
          - {label: "View All Projects Label", name: "viewAllProjectsLabel", widget: "string", default: "View All Projects"}
          - {label: "View All Posts Label", name: "viewAllPostsLabel", widget: "string", default: "View All Posts"}
          
          # Route Slugs
          - {label: "Posts URL Slug", name: "postsSlug", widget: "string", default: "posts"}
          - {label: "Projects URL Slug", name: "projectsSlug", widget: "string", default: "projects"}
          
          # Search Labels
          - {label: "Search Placeholder", name: "searchPlaceholder", widget: "string", default: "Search posts and projects..."}
          - {label: "Search No Results Text", name: "searchNoResults", widget: "string", default: "No results found for \"{query}\""}
          - {label: "Search Empty State Text", name: "searchEmptyState", widget: "string", default: "Type to start searching..."}

          # Social Links
          - label: "Social Links"
            name: "links"
            widget: "list"
            fields:
              - {label: "Platform", name: "platform", widget: "select", options: ["fa-brands fa-github", "fa-brands fa-x-twitter", "fa-brands fa-instagram", "fa-brands fa-linkedin", "fa-brands fa-discord", "fa-brands fa-youtube", "fa-brands fa-twitch", "fa-brands fa-tiktok", "fa-brands fa-facebook", "fa-brands fa-reddit", "fa-brands fa-pinterest", "fa-brands fa-weibo", "fa-brands fa-zhihu", "fa-brands fa-product-hunt", "fa-brands fa-steam", "fa-brands fa-spotify", "fa-solid fa-envelope", "fa-solid fa-rss", "fa-solid fa-globe"]} 
              - {label: "URL", name: "url", widget: "string"}
